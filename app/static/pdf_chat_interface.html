<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface PDF et Chat LLM</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <script src="chatFunctions.js"></script>
    <script src="test-mediation.js"></script>
    <style>
        /* Styles spécifiques pour cette interface */
        .main_container {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        .collapse {
            display: flex;
            height: 100vh;
            width: 100%;
        }
        .document-selector {
            flex: 1;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            background: white;
            max-width: 300px;
        }

        .document-list {
            list-style: none;
            padding: 0;
        }

        .document-item {
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .document-item:hover {
            background-color: #f8f9fa;
        }

        .document-item.active {
            background-color: #667eea;
            color: white;
            border-color: #667eea;
        }

        .document-item h4 {
            margin: 0 0 5px 0;
            font-size: 14px;
        }

        .document-item p {
            margin: 0;
            font-size: 12px;
            opacity: 0.8;
        }

        .pdf-viewer {
            flex: 2;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            background: white;
        }

        .pdf-viewer iframe {
            width: 100%;
            height: 90vh;
            border: none;
        }

        .container {
            flex: 2;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 0 20px 20px 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .chat-container {
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
            flex: 1;
        }

        .input-container {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        #questionInput {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }

        #sendButton {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .loading-documents {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner-small {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            animation: spin 1s linear infinite;
            margin: 0 auto 5px;
            display: inline-block;
        }
        .back-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .back-button:hover {
            background: #5a6fd1;
        }

        .pdf-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="main_container">
        <div class="collapse">
            <div class="document-selector">
                <h3>Documents disponibles</h3>
                <div class="loading-documents" id="loadingDocuments">
                    <div class="spinner-small"></div>
                    <p>Chargement des documents...</p>
                </div>
                <ul class="document-list" id="documentList">
                    <!-- Les documents seront chargés dynamiquement ici -->
                </ul>
            </div>

            <div class="pdf-viewer">
                <button id="backToList" class="back-button">← Retour à la liste</button>
                <h2>Document PDF</h2>
                <iframe id="pdf-iframe" src=""></iframe>
            </div>

            <div class="container">
                <div class="header">
                    <div class="header-main">
                        <h1>🤖 Chatbot inversé M3C</h1>
                        <p class="subtitle">Système de Questions/Réponses sur documents</p>
                    </div>
                    <div class="header-nav">
                        <a href="m3c-chatbot.html" class="nav-link">ChatBot RAG</a>
                        <span class="nav-separator">|</span>
                        <a href="pdf_chat_interface.html" class="nav-link active">Chatbot Inversé</a>
                    </div>
                </div>

                <div class="chat-container" id="chatMessages">
                    <div class="message bot">
                        <div class="message-content">
                            👋 Bonjour ! Choisissez un document à étudier.<br><br>
                        </div>
                    </div>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Recherche en cours...</p>
                </div>

                <div class="input-container">
                    <input
                        type="text"
                        id="questionInput"
                        placeholder="Posez votre question sur le document..."
                        onkeypress="if(event.key==='Enter') sendMessage()"
                    >
                    <button id="sendButton" onclick="sendMessage()">Envoyer</button>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
